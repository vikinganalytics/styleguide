<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root {
      --va-blue: #1283C0;
      --va-navy: #073955;
      --va-dark: #071525;
      --va-green: #20B78C;
      --va-orange: #D36243;
      --va-gray-600: #8C8C8C;
      --va-gray-200: #F0F0F0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #000;
      line-height: 1.6;
      max-width: 52rem;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    h1, h2, h3, h4 { margin: 1.8em 0 0.6em; line-height: 1.3; }
    h1 { font-size: 2rem; font-weight: 300; color: var(--va-dark); }
    h2 { font-size: 1.5rem; font-weight: 600; border-bottom: 2px solid var(--va-blue); padding-bottom: 0.3em; }
    h3 { font-size: 1.15rem; }
    h1:first-child { margin-top: 0; }

    p, ul, ol { margin: 0.8em 0; }
    ul, ol { padding-left: 1.5em; }
    li { margin: 0.3em 0; }

    a { color: var(--va-blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    code {
      font-family: "JetBrains Mono", "Fira Code", Consolas, monospace;
      font-size: 0.9em;
      background: var(--va-gray-200);
      padding: 0.15em 0.4em;
      border-radius: 3px;
    }

    pre {
      background: var(--va-dark);
      color: #e0e0e0;
      padding: 1em 1.2em;
      border-radius: 6px;
      overflow-x: auto;
      margin: 1em 0;
    }
    pre code { background: none; padding: 0; color: inherit; }

    table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
    }
    th, td {
      text-align: left;
      padding: 0.5em 0.8em;
      border-bottom: 1px solid var(--va-gray-200);
    }
    th { font-weight: 600; }

    hr { border: none; border-top: 1px solid var(--va-gray-200); margin: 2em 0; }

    blockquote {
      border-left: 3px solid var(--va-blue);
      padding-left: 1em;
      color: var(--va-gray-600);
      margin: 1em 0;
    }

    strong { font-weight: 600; }

    /* Rouge syntax highlighting (dark theme matching brand) */
    .highlight .k, .highlight .kd, .highlight .kn, .highlight .kp,
    .highlight .kr, .highlight .kt { color: #8BBAE5; }          /* keywords — steel blue */
    .highlight .s, .highlight .s1, .highlight .s2, .highlight .sb,
    .highlight .sc, .highlight .sd, .highlight .sh { color: #20B78C; } /* strings — sea green */
    .highlight .c, .highlight .c1, .highlight .cm, .highlight .cs,
    .highlight .ch, .highlight .cp, .highlight .cpf { color: #8C8C8C; font-style: italic; } /* comments */
    .highlight .nb, .highlight .bp { color: #8BBAE5; }          /* builtins */
    .highlight .nf, .highlight .fm { color: #e0e0e0; }          /* function names */
    .highlight .nc { color: #8BBAE5; font-weight: 600; }        /* class names */
    .highlight .mi, .highlight .mf, .highlight .mh, .highlight .mo,
    .highlight .il { color: #D36243; }                           /* numbers — terracotta */
    .highlight .o, .highlight .ow { color: #e0e0e0; }           /* operators */
    .highlight .p { color: #e0e0e0; }                            /* punctuation */
    .highlight .nn { color: #8BBAE5; }                           /* module names */
    .highlight .na { color: #20B78C; }                           /* attributes */
    .highlight .si { color: #D36243; }                           /* string interpolation */
    .highlight .se { color: #D36243; }                           /* string escape */
    .highlight .kc { color: #D36243; }                           /* constants (True/False/None) */
    .highlight .ni { color: #e0e0e0; }                           /* entity */
    .highlight .ne { color: #D36243; }                           /* exceptions */
    .highlight .dl { color: #20B78C; }                           /* string delimiters */
    .highlight .nv, .highlight .nv .s2 { color: #8BBAE5; }      /* shell variables */
    .highlight .nt { color: #8BBAE5; }                           /* flags/tags */
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
