name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build HTML from Markdown
        run: |
          mkdir -p public
          docker run --rm -v "${{ github.workspace }}:/data" -w /data pandoc/core:latest \
            --standalone \
            --metadata title="Viking Analytics Style Guide" \
            --css https://cdn.simplecss.org/simple.min.css \
            -o public/index.html \
            index.md
          docker run --rm -v "${{ github.workspace }}:/data" -w /data pandoc/core:latest \
            --standalone \
            --metadata title="Python Style Guide" \
            --css https://cdn.simplecss.org/simple.min.css \
            -o public/pyguide.html \
            pyguide.md

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
